<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 — TrainingEdge</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #000;
        color: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }
    .login-card {
        background: rgba(28,28,30,0.8);
        backdrop-filter: blur(40px);
        border: 0.5px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 40px;
        width: 380px;
        max-width: 90vw;
        text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
    .error {
        background: rgba(255,69,58,0.1);
        border: 0.5px solid rgba(255,69,58,0.3);
        border-radius: 10px;
        padding: 10px;
        font-size: 13px;
        color: #ff453a;
        margin-bottom: 16px;
    }
    input[type="password"] {
        width: 100%;
        background: rgba(255,255,255,0.06);
        border: 0.5px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        padding: 14px 16px;
        color: #f5f5f7;
        font-size: 16px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 16px;
    }
    input[type="password"]:focus {
        border-color: rgba(10,132,255,0.6);
    }
    input[type="password"]::placeholder {
        color: rgba(255,255,255,0.3);
    }
    button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #bf5af2, #0a84ff);
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="login-card">
    <div class="logo">&#x1F3CB;</div>
    <h1>TrainingEdge</h1>
    <div class="subtitle">请输入访问密码</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <input type="hidden" name="next" value="{{ next }}">
        <input type="password" name="password" placeholder="访问密码" autofocus autocomplete="current-password">
        <button type="submit">登录</button>
    </form>
</div>
</body>
</html>
